<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nexus Executor Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- BARRA SUPERIOR ESTILO MACOS (AHORA INTEGRADA EN EL SIDEBAR / CONTENIDO) -->
    <!-- PANTALLA DE CARGA INICIAL -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <svg class="splash-spinner" viewBox="0 0 50 50">
                <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
            </svg>
            <div class="splash-text">Iniciando Motor Nexus...</div>
        </div>
    </div>

    <!-- FONDO FLUIDO ESTILO APPLE -->
    <div class="mac-wallpaper"></div>

    <div class="mac-window">
        <!-- BARRA LATERAL (SIDEBAR) -->
        <aside class="mac-sidebar">
            <div class="mac-traffic-lights">
                <button class="mac-btn close" onclick="windowControl('close')" title="Cerrar"></button>
                <button class="mac-btn minimize" onclick="windowControl('minimize')" title="Minimizar"></button>
                <button class="mac-btn maximize" onclick="windowControl('maximize')" title="Maximizar"></button>
            </div>
            
            <div class="sidebar-search">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" id="search-input" class="mac-input-search" placeholder="Buscar">
            </div>

            <nav class="sidebar-nav category-tabs">
                <button class="sidebar-item tab-btn active" data-filter="all">
                    <span class="icon-container" style="background:var(--mac-blue);"><svg viewBox="0 0 24 24" fill="white"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg></span>
                    Todos
                </button>
                <button class="sidebar-item tab-btn" data-filter="py">
                    <span class="icon-container" style="background:#5dade2;"><svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></span>
                    Python
                </button>
                <button class="sidebar-item tab-btn" data-filter="bat">
                    <span class="icon-container" style="background:#e6af00;"><svg viewBox="0 0 24 24" fill="white"><path d="M3 3h18v18H3V3zm16 16V5H5v14h14zm-8-2h6v-2h-6v2zm-4-4h10v-2H7v2zm0-4h10V7H7v2z"/></svg></span>
                    Batch
                </button>
                <button class="sidebar-item tab-btn" data-filter="active">
                    <span class="icon-container" style="background:var(--mac-green);"><svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg></span>
                    Activos
                </button>
            </nav>

            <div class="sidebar-bottom">
                <div class="sidebar-divider"></div>
                <button id="btn-settings" class="sidebar-item" title="Configuración" onclick="openSettings()">
                    <span class="icon-container" style="background:#8E8E93;"><svg viewBox="0 0 24 24" fill="white"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.73 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></span>
                    Configuración global
                </button>
            </div>
            <div class="sidebar-drag-region"></div>
        </aside>

        <!-- ÁREA DE CONTENIDO (MAIN PANE) -->
        <main class="mac-content">
            <header class="content-header">
                <div class="content-title-drag">
                    <!-- Título dinámico según categoría, empezando por Todos -->
                    <h2 id="current-category-title" class="mac-main-title">Todos</h2>
                </div>
                
                <div class="content-actions">
                    <button id="btn-refresh" class="mac-icon-btn-top" title="Recargar Recursos">
                        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    </button>
                </div>
            </header>

            <div class="content-scrollable">
                <div class="mac-group global-settings-group">
                    <div class="mac-group-row">
                        <div class="mac-group-label">Motor de ejecución</div>
                        <div class="mac-group-control">
                            <select id="run-mode" class="mac-select">
                                <option value="internal">Silencioso (Integrado)</option>
                                <option value="external">Nativo (CMD/Terminal)</option>
                            </select>
                        </div>
                    </div>
                    <div class="mac-group-row">
                        <div class="mac-group-label">Parámetros Globales</div>
                        <div class="mac-group-control">
                            <input type="text" id="script-args" class="mac-input-clean" placeholder="Añade argumentos...">
                        </div>
                    </div>
                </div>

                <!-- PANEL PRINCIPAL (LISTA DE SCRIPTS) -->
                <ul id="script-list" class="mac-grouped-list">
                    <!-- Tarjetas inyectadas por JS -->
                </ul>
            </div> <!-- CLOSE content-scrollable -->
            
            <!-- TERMINAL INFERIOR (CAJÓN) Moviéndolo dentro de mac-content -->
            <footer class="terminal-drawer mac-glass" id="terminal-drawer">
                <div class="drawer-header" id="terminal-toggle" onclick="toggleTerminal()">
                    <div class="drawer-title" style="display:flex;align-items:center;gap:10px;font-weight:600;font-size:13px;color:var(--mac-blue);">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                        <span>Terminal de Sistema</span>
                    </div>
                    <div style="display:flex; gap:15px; align-items:center;">
                        <button id="btn-copy" class="mac-btn-outline" style="font-size:11px; padding:4px 8px; z-index:101; position:relative;" onclick="event.stopPropagation(); copiarTerminal()">Copiar Logs</button>
                        <button id="btn-clear" class="mac-btn-outline" style="font-size:11px; padding:4px 8px; z-index:101; position:relative;" onclick="event.stopPropagation();">Limpiar Log</button>
                        <button class="mac-icon-btn btn-drawer-toggle" id="btn-terminal-icon" style="transform: rotate(0deg); transition: transform 0.3s; pointer-events:none;">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="drawer-content">
                    <div class="terminal-wrapper">
                        <div id="terminal" class="mac-terminal mac-glass">
                            <span class="log-system"> Sistema Nexus inicializado. Listo para operar.</span>
                        </div>
                    </div>
                </div>
            </footer>
        </main>
    </div>
    
    <!-- CONTENEDOR DE NOTIFICACIONES (TOAST) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- MODAL SETTINGS -->
    <div id="settings-modal" class="modal-overlay" onclick="if(event.target===this) closeSettings()">
        <div class="mac-modal mac-glass" style="width: 400px; text-align: left;">
            <h3 style="margin-bottom: 20px;">Configuración Nexus</h3>
            <div class="mac-form-group">
                <label>Tema de Interfaz Visual:</label>
                <select id="theme-selector" class="mac-input" style="width: 100%;" onchange="changeTheme()">
                    <option value="dark">MacOS Dark (Por defecto)</option>
                    <option value="light">MacOS Light Clean</option>
                    <option value="cyber">Cyberpunk Terminal</option>
                </select>
            </div>
            <div class="mac-modal-actions" style="margin-top: 30px;">
                <button class="mac-btn-primary" onclick="closeSettings()">Guardar y Cerrar</button>
            </div>
        </div>
    </div>

    <!-- MODAL AUTOPILOT -->
    <div id="autopilot-modal" class="modal-overlay" onclick="if(event.target===this) cerrarAutopilot()">
        <div class="mac-modal mac-glass">
            <h3>Configurar Autopilot</h3>
            <p id="sch-filename" class="modal-subtitle">script.py</p>
            
            <div class="mac-form-group">
                <label>Ejecutar en bucle cada:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="sch-time" class="mac-input" value="15" min="1" style="width: 80px;">
                    <select id="sch-unit" class="mac-input" style="flex: 1;">
                        <option value="1000">Segundos</option>
                        <option value="60000" selected>Minutos</option>
                        <option value="3600000">Horas</option>
                    </select>
                </div>
            </div>
            
            <div class="mac-modal-actions">
                <button class="mac-btn-outline" onclick="cerrarAutopilot()">Cancelar</button>
                <button class="mac-btn-primary" onclick="iniciarAutopilot()">Iniciar Bucle</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
