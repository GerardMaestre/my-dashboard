<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nexus Executor Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- BARRA SUPERIOR ESTILO MACOS -->
    <div class="mac-titlebar">
        <div class="mac-traffic-lights">
            <button class="mac-btn close" onclick="windowControl('close')" title="Cerrar"></button>
            <button class="mac-btn minimize" onclick="windowControl('minimize')" title="Minimizar"></button>
            <button class="mac-btn maximize" onclick="windowControl('maximize')" title="Maximizar"></button>
        </div>
        <div class="mac-title">Nexus Executor Pro</div>
        
        <!-- START HUD -->
        <div class="system-hud" style="position: absolute; right: 15px; display: flex; gap: 15px; font-size: 11px; font-weight: 600; color: var(--mac-text-muted); -webkit-app-region: no-drag;">
            <div class="hud-item" style="display:flex; align-items:center; gap:6px;">
                <span>CPU</span>
                <div class="hud-bar-bg" style="width: 50px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;">
                    <div id="hud-cpu-bar" style="height: 100%; width: 0%; background: var(--mac-blue); transition: width 0.3s ease, background 0.3s;"></div>
                </div>
                <span id="hud-cpu-text" style="width: 25px; text-align: right;">0%</span>
            </div>
            <div class="hud-item" style="display:flex; align-items:center; gap:6px;">
                <span>RAM</span>
                <div class="hud-bar-bg" style="width: 50px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;">
                    <div id="hud-ram-bar" style="height: 100%; width: 0%; background: var(--mac-green); transition: width 0.3s ease, background 0.3s;"></div>
                </div>
                <span id="hud-ram-text" style="width: 25px; text-align: right;">0%</span>
            </div>
        </div>
        <!-- END HUD -->
    </div>

    <!-- PANTALLA DE CARGA INICIAL -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <svg class="splash-spinner" viewBox="0 0 50 50">
                <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
            </svg>
            <div class="splash-text">Iniciando Motor Nexus...</div>
        </div>
    </div>

    <!-- FONDO FLUIDO ESTILO APPLE -->
    <div class="mac-wallpaper"></div>

    <div class="layout">
        <!-- CABECERA SUPERIOR (BUSCADOR, PESTAÑAS Y SETTINGS) -->
        <header class="main-header mac-glass">
            <div class="header-controls">
                <input type="text" id="search-input" class="mac-input search-bar" placeholder="Buscar automatización...">
                <button id="btn-refresh" class="mac-icon-btn" title="Recargar Scripts">
                    <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
            </div>
            <div class="category-tabs">
                <button class="tab-btn active" data-filter="all">Todos</button>
                <button class="tab-btn" data-filter="py">Python</button>
                <button class="tab-btn" data-filter="bat">Batch</button>
                <button class="tab-btn" data-filter="active">Activos</button>
            </div>
            
            <!-- PARÁMETROS Y MOTOR GLOBALES SIEMPRE VISIBLES -->
            <div class="global-settings" style="display:flex; gap:15px; margin-top:20px; align-items:center;">
                <div class="tool-group" style="display:flex; align-items:center; gap:8px;">
                    <label style="font-size:12px; color:var(--mac-text-muted);">Motor:</label>
                    <select id="run-mode" class="mac-input select-mode" style="width: auto;">
                        <option value="internal">Silencioso (Integrado)</option>
                        <option value="external">Nativo (CMD/Terminal)</option>
                    </select>
                </div>
                <div class="tool-group flex-1" style="display:flex; align-items:center; gap:8px; flex:1;">
                    <label style="font-size:12px; color:var(--mac-text-muted);">Parámetros Globales:</label>
                    <input type="text" id="script-args" class="mac-input w-full" style="flex:1;" placeholder="Añade rutas, contraseñas o argumentos aquí (Aplicará a todos)...">
                </div>
            </div>
        </header>

        <!-- PANEL PRINCIPAL (CUADRÍCULA DE SCRIPTS) -->
        <main class="grid-container">
            <ul id="script-list" class="script-list script-grid">
                <!-- Tarjetas inyectadas por JS -->
            </ul>
        </main>

        <!-- TERMINAL INFERIOR (CAJÓN) -->
        <footer class="terminal-drawer mac-glass" id="terminal-drawer">
            <div class="drawer-header" id="terminal-toggle" onclick="toggleTerminal()">
                <div class="drawer-title" style="display:flex;align-items:center;gap:10px;font-weight:600;font-size:13px;color:var(--mac-blue);">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                    <span>Terminal de Sistema</span>
                </div>
                <div style="display:flex; gap:15px; align-items:center;">
                    <button id="btn-clear" class="mac-btn-outline" style="font-size:11px; padding:4px 8px; z-index:101; position:relative;" onclick="event.stopPropagation();">Limpiar Log</button>
                    <button class="mac-icon-btn btn-drawer-toggle" id="btn-terminal-icon" style="transform: rotate(0deg); transition: transform 0.3s; pointer-events:none;">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                    </button>
                </div>
            </div>
            <div class="drawer-content">
                <div class="terminal-wrapper">
                    <div id="terminal" class="mac-terminal mac-glass">
                        <span class="log-system"> Sistema Nexus inicializado. Listo para operar.</span>
                    </div>
                </div>
            </div>
        </footer>
    </div>
    
    <!-- CONTENEDOR DE NOTIFICACIONES (TOAST) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- MODAL AUTOPILOT -->
    <div id="autopilot-modal" class="modal-overlay">
        <div class="mac-modal mac-glass">
            <h3>Configurar Autopilot</h3>
            <p id="sch-filename" class="modal-subtitle">script.py</p>
            
            <div class="mac-form-group">
                <label>Ejecutar en bucle cada:</label>
                <div style="display: flex; gap: 10px;">
                    <input type="number" id="sch-time" class="mac-input" value="15" min="1" style="width: 80px;">
                    <select id="sch-unit" class="mac-input" style="flex: 1;">
                        <option value="1000">Segundos</option>
                        <option value="60000" selected>Minutos</option>
                        <option value="3600000">Horas</option>
                    </select>
                </div>
            </div>
            
            <div class="mac-modal-actions">
                <button class="mac-btn-outline" onclick="cerrarAutopilot()">Cancelar</button>
                <button class="mac-btn-primary" onclick="iniciarAutopilot()">Iniciar Bucle</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
