name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer and zip
        run: npm run build -- --config.directories.output=dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path "dist")) {
            throw "No se genero la carpeta dist"
          }
          Get-ChildItem -Path "dist" -File | Format-Table -AutoSize

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.${{ github.run_number }}
          name: Nuevo Lanzamiento Nexus v1.4.${{ github.run_number }}
          files: |
            dist/*.exe
            dist/*.zip
          body: Ultima version autogenerada. Descargar setup o zip.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
